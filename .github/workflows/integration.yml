
# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs
#Can be anything ,(Its Just a Name After all )
name: integration

#triggers 
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

#list jobs which we want the ci to do
jobs:
  build:
  # choose a OS 
    runs-on: ubuntu-latest

#strategy/matxix(defing node verion to text our app on various node versions)
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

#the ci will follow the given steps in order
    steps:
 # you are using  - uses: actions/checkout@v4 to  Checkout code

    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
    #seting up nodejs
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run build --if-present
    - run: npm test